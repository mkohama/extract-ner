# マスク辞書のサンプル（書式）
#
# 使い方（.env と同じ扱い）:
#   1. このファイルを data/mask_dict.yaml にコピーする。
#   2. mask_dict.yaml に実際の社名・商標・人名を書く（こちらはコミット対象外）。
#
# ルール:
#   - ここに載せた語は必ずマスク対象（確定）になる。
#   - 照合は既定でトークン単位（部分文字列では拾わない。例: 変数名 SmashMark の中の Smash は拾わない）。
#   - 大小文字・全角半角は自動で吸収（SMASH / Smash / smash は同一）。複数語（Tokyo Electron）も可。
#   - 別表記（カタカナ↔英語・略称・旧称）だけ aliases に書く。
#   - canonical（代表表記）が同じ別名は、マスク後に同じプレースホルダに統一される。
#   - mask（任意）を書くと、マスク後の置換語をその語に固定できる（未指定なら [社1] 等を自動採番）。
#   - embed: true（任意）を付けた語は、複合トークンのサブワード境界でも内包照合する
#     （例: Smash → SmashMark の Smash、CB → CBMark の CB。境界一致なので ECBType の CB は拾わない）。
#   - これらは UI の「🗂 マスク辞書」からも確認・追加・編集・保存できる。

社名:
  - canonical: eXmotion
    aliases: [エクスモーション, エクスモ, eXmo]
    mask: 〔メーカーA〕              # 任意。マスク後の伏せ字を固定（未指定なら自動採番）
  - 社B                            # 別名が無ければ文字列だけでよい

商標:
  - canonical: 商標X
    aliases: [ｼｮｳﾋｮｳエックス]       # 商標も表記ゆれ（英字↔カタカナ等）を別名に
    embed: true                    # 複合語の中（例 商標XMark の 商標X）も伏字にする
  - 商標Y

人名:
  - 姓A
  - 姓B
